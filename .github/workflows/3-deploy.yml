name: 3 — Deploy

on:
  workflow_run:
    workflows: ["2 — Docker Build & Push"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: ./terraform

jobs:
  deploy:
    name: Terraform Apply — Deploy new image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Get ECR URL from Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "ecr_url=$(terraform output -raw ecr_url)" >> $GITHUB_OUTPUT

      - name: Terraform apply — trigger null_resource with new image tag
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ECR_URL: ${{ steps.tf-outputs.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          terraform apply -auto-approve \
            -var="image_tag=$IMAGE_TAG" \
            -var="ecr_url=$ECR_URL"

      - name: Confirm image pulled on EC2
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "null_resource ran with image_tag=${{ github.sha }}"
          echo "EC2 instances should now be running ${{ steps.tf-outputs.outputs.ecr_url }}:${{ github.sha }}"
